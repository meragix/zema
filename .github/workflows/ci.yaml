name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  zema:
    uses: ./.github/workflows/_dart_package.yml
    with:
      package: packages/zema
    secrets: inherit

  zema_forms:
    uses: ./.github/workflows/_flutter_package.yml
    with:
      package: packages/zema_forms
    secrets: inherit
 