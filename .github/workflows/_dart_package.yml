name: Dart Package CI

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
        description: "Path to the package (e.g. packages/zema)"
      min-sdk:
        required: false
        type: string
        default: "3.5.0"

jobs:
  ci:
    name: "${{ inputs.package }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Flutter action bundles the Dart SDK — no need for dart-lang/setup-dart.
      # Flutter is required anyway for `melos bootstrap` (workspace has Flutter packages).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 7.4.0

      - name: Bootstrap
        run: melos bootstrap

      - name: Format
        working-directory: ${{ inputs.package }}
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: ${{ inputs.package }}
        run: dart analyze --fatal-infos

      - name: Test
        working-directory: ${{ inputs.package }}
        run: dart test --coverage=coverage

      - name: Format coverage
        working-directory: ${{ inputs.package }}
        run: dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ${{ inputs.package }}/coverage/lcov.info
          fail_ci_if_error: false
