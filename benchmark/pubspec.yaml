name: zema_benchmark
description: Competitive performance benchmarks — zema vs acanthis, ez_validator, luthor, zod_validation, zard.
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  # zema — path dep from this monorepo
  zema:
    path: ../packages/zema

  # Competitors
  acanthis: ^1.5.4
  ez_validator: ^0.3.7
  luthor: ^0.17.0
  zard: ^0.0.26

  benchmark_harness: ^2.2.0
