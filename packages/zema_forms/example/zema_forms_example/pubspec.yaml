name: zema_forms_example
description: "Example app demonstrating zema_forms — schema-backed Flutter forms."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  zema:
    path: ../../../zema
  zema_forms:
    path: ../..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  # Force both the example and zema_forms to resolve zema from the local path.
  zema:
    path: ../../../zema
