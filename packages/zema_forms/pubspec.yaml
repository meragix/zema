name: zema_forms
description: "Flutter form widgets backed by Zema schemas. Surgical per-field rebuilds, isTouched UX, auto-focus on first error, and a form-level error banner."
version: 0.1.0
homepage: https://meragix.github.io/zema/plugins/zema_forms
repository: https://github.com/meragix/zema
issue_tracker: https://github.com/meragix/zema/issues
documentation: https://meragix.github.io/zema/plugins/zema_forms

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.18.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  zema: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

topics:
  - flutter
  - forms
  - validation
  - schema
  - zema
