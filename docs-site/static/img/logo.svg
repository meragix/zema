<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1F3E"/>
      <stop offset="100%" stop-color="#252D72"/>
    </linearGradient>
    <linearGradient id="z-fill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#00C9A7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!--
    Bold block-Z letterform — 10-point polygon.
    Bounds: x 96–416 (320 px wide), y 96–416 (320 px tall).
    Bar height: 72 px.  Diagonal-bar horizontal width: 112 px (~35 % of total).
  -->
  <path
    d="M 96 96
       L 416 96
       L 416 168
       L 208 344
       L 416 344
       L 416 416
       L 96 416
       L 96 344
       L 304 168
       L 96 168
       Z"
    fill="url(#z-fill)"/>
</svg>
