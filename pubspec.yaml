name: zema_workspace
description: Monorepo workspace for Zema packages
repository: https://github.com/meragix/zema
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - packages/zema
  - packages/zema_forms
  - packages/zema_firestore
  - packages/zema_hive

dev_dependencies:
  melos: ^7.4.0

melos:
  command:
    version:
      # Generate commit links in package changelogs.
      linkToCommits: true
      workspaceChangelog: false
    bootstrap:
      runPubGetInParallel: true

  scripts:
    # Analysis
    analyze:
      description: Run static analysis on all packages
      run: melos exec -- dart analyze --fatal-infos .

    # Formatting
    format:
      description: Format all packages
      run: melos exec -- dart format .

    format:check:
      description: Check formatting (CI)
      run: melos exec -- dart format --output=none --set-exit-if-changed .

    # Testing
    test:
      description: Run all tests (dart packages + flutter packages)
      run: melos run test:dart && melos run test:flutter

    test:dart:
      description: Run tests for pure Dart packages
      run: melos exec --fail-fast -- dart test --coverage=coverage
      packageFilters:
        flutter: false

    test:flutter:
      description: Run tests for Flutter packages
      run: melos exec --fail-fast -- flutter test --coverage
      packageFilters:
        flutter: true

    test:coverage:
      description: Generate coverage report (dart packages only)
      run: |
        melos exec --fail-fast -- dart test --coverage=coverage
        melos exec -- dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
      packageFilters:
        flutter: false

    # Publishing
    publish:check:
      description: Dry run publish
      run: melos exec -- dart pub publish --dry-run

    # Version management
    version:
      description: Update version across packages
      run: melos version

    # Clean
    clean:
      description: Clean all packages
      run: melos exec -- dart pub cache clean